<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Watchlist</title>
    <link
      rel="stylesheet"
      href="/JavaScript/13-Projects/Movie-watchlist/styles.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
      integrity="sha512-ApSLB1Pd3/bZN8fWB/RG9YhN/7bd9Hkf3AGaE2mPfebjrxagjuBtx2GcgdqIlJkUzwylBo61r9Xa9NmgBI0swA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="watchlist-container">
      <div class="watchlist-header">
        <div class="watchlist-nav">
          <h1>Find your film</h1>
          <ul>
            <li>
              <a href="/JavaScript/13-Projects/Movie-watchlist/index.html"
                >Home</a
              >
            </li>
            <li>
              <a href="/JavaScript/13-Projects/Movie-watchlist/watchlist.html"
                >Watchlist</a
              >
            </li>
          </ul>
        </div>
        <div class="bg-transparent"></div>
      </div>
      <div class="watchlist-main">
        <div class="watchlist-movies" id="watchlist-movies"></div>
        <div class="start-exploring">
          <img src="./images/Icon.png" alt="Film Reel" />
          <p>Your watchlist!</p>
        </div>
      </div>
      <div class="watchlist-search">
        <input
          type="search"
          name="search"
          id="search-input"
          placeholder="Search for movies..."
        />
        <button id="search-button">Search</button>
      </div>
    </div>
    <script
      src="/JavaScript/13-Projects/Movie-watchlist/main.js"
      type="module"
    ></script>
  </body>
</html>
